<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Pulse 2048</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #09090b;
        --panel: #141418;
        --ink: #f4f4f5;
        --muted: #a1a1aa;
        --accent: #ff5a6a;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: radial-gradient(ellipse at top, #2a1014, var(--bg) 55%);
        color: var(--ink);
        font-family: "Segoe UI", system-ui, sans-serif;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }
      .wrap {
        height: 100%;
        display: grid;
        place-items: center;
        padding: 16px;
      }
      .card {
        width: min(520px, 100%);
        background: color-mix(in srgb, var(--panel) 88%, transparent);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 16px;
        padding: 16px;
        backdrop-filter: blur(10px);
      }
      .top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 12px;
      }
      h1 { margin: 0; font-size: 1.15rem; letter-spacing: 0.04em; }
      .score {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }
      .score b { color: var(--accent); font-size: 1.25rem; }
      .hint { color: var(--muted); font-size: 0.8rem; margin: 0 0 12px; }
      .board {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        background: #0c0c10;
        padding: 10px;
        border-radius: 12px;
      }
      .cell {
        aspect-ratio: 1;
        border-radius: 10px;
        display: grid;
        place-items: center;
        font-weight: 800;
        font-size: clamp(1.1rem, 5vw, 1.7rem);
        background: #1a1a22;
        transition: transform 80ms ease;
      }
      .n2 { background: #3f3f46; color: #fff; }
      .n4 { background: #52525b; }
      .n8 { background: #b45309; }
      .n16 { background: #c2410c; }
      .n32 { background: #dc2626; }
      .n64 { background: #e11d48; }
      .n128 { background: #db2777; font-size: clamp(0.95rem, 4vw, 1.35rem); }
      .n256 { background: #7c3aed; font-size: clamp(0.95rem, 4vw, 1.35rem); }
      .n512 { background: #2563eb; font-size: clamp(0.95rem, 4vw, 1.35rem); }
      .n1024, .n2048, .n4096 {
        background: linear-gradient(135deg, #ff5a6a, #ff8ec8);
        font-size: clamp(0.8rem, 3.5vw, 1.1rem);
      }
      .actions { margin-top: 12px; display: flex; gap: 8px; }
      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font-weight: 700;
        cursor: pointer;
        background: var(--accent);
        color: white;
      }
      button.ghost {
        background: transparent;
        border: 1px solid rgba(255,255,255,0.2);
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="top">
          <h1>Pulse 2048</h1>
          <div class="score">Score<br /><b id="score">0</b></div>
        </div>
        <p class="hint">Arrow keys / swipe. Beat the community board.</p>
        <div class="board" id="board"></div>
        <div class="actions">
          <button type="button" id="restart">New game</button>
          <button type="button" class="ghost" id="submit">Submit score</button>
        </div>
      </div>
    </div>
    <script>
      const SIZE = 4;
      let grid = [];
      let score = 0;
      let bestSubmitted = 0;
      const board = document.getElementById("board");
      const scoreEl = document.getElementById("score");

      function empty() {
        return Array.from({ length: SIZE }, () => Array(SIZE).fill(0));
      }

      function spawn() {
        const free = [];
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) if (!grid[r][c]) free.push([r, c]);
        }
        if (!free.length) return;
        const [r, c] = free[Math.floor(Math.random() * free.length)];
        grid[r][c] = Math.random() < 0.9 ? 2 : 4;
      }

      function render() {
        board.innerHTML = "";
        for (let r = 0; r < SIZE; r++) {
          for (let c = 0; c < SIZE; c++) {
            const v = grid[r][c];
            const cell = document.createElement("div");
            cell.className = "cell" + (v ? " n" + v : "");
            cell.textContent = v || "";
            board.appendChild(cell);
          }
        }
        scoreEl.textContent = String(score);
      }

      function slide(line) {
        const filtered = line.filter(Boolean);
        const out = [];
        let gained = 0;
        for (let i = 0; i < filtered.length; i++) {
          if (filtered[i] === filtered[i + 1]) {
            const merged = filtered[i] * 2;
            out.push(merged);
            gained += merged;
            i++;
          } else out.push(filtered[i]);
        }
        while (out.length < SIZE) out.push(0);
        return { line: out, gained };
      }

      function rotate(g) {
        const n = empty();
        for (let r = 0; r < SIZE; r++) for (let c = 0; c < SIZE; c++) n[c][SIZE - 1 - r] = g[r][c];
        return n;
      }

      function move(dir) {
        let rotated = grid.map((row) => row.slice());
        for (let i = 0; i < dir; i++) rotated = rotate(rotated);
        let moved = false;
        let gained = 0;
        rotated = rotated.map((row) => {
          const next = slide(row);
          if (next.line.some((v, i) => v !== row[i])) moved = true;
          gained += next.gained;
          return next.line;
        });
        for (let i = 0; i < (4 - dir) % 4; i++) rotated = rotate(rotated);
        if (!moved) return false;
        grid = rotated;
        score += gained;
        spawn();
        render();
        postScore(false);
        return true;
      }

      function postScore(force) {
        if (!force && score <= bestSubmitted) return;
        bestSubmitted = Math.max(bestSubmitted, score);
        window.parent.postMessage(
          { type: "gls-game-score", gameId: "pulse-2048", score, force: !!force },
          "*",
        );
      }

      function reset() {
        grid = empty();
        score = 0;
        bestSubmitted = 0;
        spawn();
        spawn();
        render();
      }

      const keymap = { ArrowLeft: 0, ArrowUp: 1, ArrowRight: 2, ArrowDown: 3 };
      window.addEventListener("keydown", (e) => {
        if (keymap[e.key] == null) return;
        e.preventDefault();
        move(keymap[e.key]);
      });

      let sx = 0, sy = 0;
      window.addEventListener("touchstart", (e) => {
        sx = e.changedTouches[0].clientX;
        sy = e.changedTouches[0].clientY;
      }, { passive: true });
      window.addEventListener("touchend", (e) => {
        const dx = e.changedTouches[0].clientX - sx;
        const dy = e.changedTouches[0].clientY - sy;
        if (Math.max(Math.abs(dx), Math.abs(dy)) < 24) return;
        if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 2 : 0);
        else move(dy > 0 ? 3 : 1);
      }, { passive: true });

      document.getElementById("restart").onclick = reset;
      document.getElementById("submit").onclick = () => postScore(true);
      reset();
    </script>
  </body>
</html>
