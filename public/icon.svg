<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none" role="img" aria-label="GLS TV">
  <defs>
    <!-- Deep cinema black with a soft red undertone -->
    <linearGradient id="bg" x1="64" y1="32" x2="448" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#161018"/>
      <stop offset="0.45" stop-color="#0a0a0e"/>
      <stop offset="1" stop-color="#12080c"/>
    </linearGradient>

    <!-- Outer glass wash -->
    <linearGradient id="glassWash" x1="80" y1="60" x2="420" y2="460" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#E50914" stop-opacity="0.07"/>
    </linearGradient>

    <!-- Inner capsule glass -->
    <linearGradient id="capsuleFill" x1="90" y1="190" x2="420" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="0.35" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="0.7" stop-color="#ff6b9d" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.03"/>
    </linearGradient>

    <linearGradient id="capsuleStroke" x1="90" y1="180" x2="420" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ff6b9d" stop-opacity="0.22"/>
    </linearGradient>

    <!-- Diagonal sheen across capsule -->
    <linearGradient id="sheen" x1="100" y1="170" x2="400" y2="310" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.35" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- GLS wordmark: white → soft blush -->
    <linearGradient id="gls" x1="120" y1="220" x2="320" y2="290" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#fff5f8"/>
      <stop offset="1" stop-color="#ffd0e0"/>
    </linearGradient>

    <!-- TV accent: brand red → rose -->
    <linearGradient id="tv" x1="330" y1="240" x2="420" y2="290" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E50914"/>
      <stop offset="0.45" stop-color="#ff4d6d"/>
      <stop offset="1" stop-color="#ff8ec8"/>
    </linearGradient>

    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="textGlow" x="-30%" y="-40%" width="160%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="tvGlow" x="-40%" y="-50%" width="180%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- App tile (iOS will round further; keep soft corners for Android/any) -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <rect width="512" height="512" rx="108" fill="url(#glassWash)"/>
  <rect x="16" y="16" width="480" height="480" rx="96" stroke="rgba(255,255,255,0.14)" stroke-width="1.5" fill="none"/>

  <!-- Glass wordmark capsule — matches in-app GlsLogo glass -->
  <g filter="url(#softShadow)">
    <rect x="56" y="198" width="400" height="116" rx="28" fill="url(#capsuleFill)" stroke="url(#capsuleStroke)" stroke-width="1.75"/>
    <rect x="56" y="198" width="400" height="116" rx="28" fill="url(#sheen)" opacity="0.85"/>
    <!-- Inner highlight edge -->
    <rect x="58" y="200" width="396" height="2" rx="1" fill="rgba(255,255,255,0.28)"/>
  </g>

  <!-- Horizontal brand: GLS + TV (same layout as site chrome) -->
  <g filter="url(#textGlow)">
    <text
      x="168"
      y="276"
      text-anchor="middle"
      font-family="Arial Black, Helvetica Black, Impact, system-ui, sans-serif"
      font-size="72"
      font-weight="900"
      letter-spacing="6"
      fill="url(#gls)"
    >GLS</text>
  </g>
  <g filter="url(#tvGlow)">
    <text
      x="348"
      y="272"
      text-anchor="middle"
      font-family="Arial, Helvetica, system-ui, sans-serif"
      font-size="38"
      font-weight="700"
      letter-spacing="10"
      fill="url(#tv)"
    >TV</text>
  </g>
</svg>
